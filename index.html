<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test ung thư</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🩺</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile.css">

    <script src="data.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>
    <div id="home-screen" class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Ung Thư đại cương</h2>
                <p class="subtitle">Trắc nghiệm ôn tập</p>
                <p class="author-signature">[Bảo An - 21YB]</p>
            </div>
            
            <div class="settings-box home-settings">
                <h3>Tùy chỉnh</h3>
                <div class="setting-item">
                    <span>Đảo câu hỏi</span>
                    <label class="switch">
                        <input type="checkbox" id="toggle-shuffle-q">
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <span>Đảo đáp án</span>
                    <label class="switch">
                        <input type="checkbox" id="toggle-shuffle-a" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="header">
                <h3>Danh sách bài học</h3>
            </div>
            <div id="lesson-list" class="list-group">
                </div>
        </main>
    </div>

    <div id="quiz-screen" class="container hidden">
        <aside class="sidebar">
            <div class="stats-box">
                <h3>Kết quả</h3>
                <p>Đã làm: <span id="completed-count">0</span>/<span id="total-count">0</span></p>
                <p class="correct-text">Số câu đúng: <span id="correct-count">0</span></p>
                
                <div class="setting-item quiz-auto-next">
                    <span class="auto-next-label">Tự chuyển câu</span>
                    <label class="switch">
                        <input type="checkbox" id="toggle-auto-next" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>

            <div class="index-box">
                <h3 class="index-title">Mục lục</h3>
                <div class="filter-tabs">
                    <button class="filter-btn active" onclick="applyFilter('all', this)">Tất cả</button>
                    <button class="filter-btn" onclick="applyFilter('answered', this)">Đã làm</button>
                </div>
                <div id="question-index" class="index-grid">
                    </div>
            </div>

            <button class="btn btn-danger" onclick="goHome()">Thoát</button>
        </aside>
        
        <main class="main-content">
            <div class="header">
                <h3 id="lesson-title">Tên bài học</h3>
            </div>
            <div class="question-box">
                <h4 id="question-text">Câu hỏi sẽ hiện ở đây?</h4>
                <div id="options-container" class="options-group">
                    </div>
            </div>
            <div class="navigation-buttons">
                <button class="btn btn-warning" onclick="redoMistakes()">Làm lại các câu sai</button>
                <div class="nav-right">
                    <button class="btn" onclick="prevQuestion()">Câu trước</button>
                    <button class="btn btn-primary" onclick="nextQuestion()">Câu sau</button>
                </div>
            </div>
        </main>
    </div>
    
    <div id="custom-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>🎉 Tuyệt vời!</h3>
            <p>Đỉnh quá bạn iu ơi, làm đúng sạch 100% rồi!</p>
            <button class="btn btn-primary" onclick="closeModal()">OK lun</button>
        </div>
    </div>
</body>
</html>
